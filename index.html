<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NL Tier Testing</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    text-align:center;
    padding:20px;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    color:#55ff55;
    font-size:42px;
    text-shadow:2px 2px black;
}

.player{
    background:#1e1e1e;
    padding:15px;
    margin:10px;
    border-radius:12px;
    border-left:8px solid #55ff55;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.rank{
    font-size:24px;
    font-weight:bold;
}

.filterButtons{
    margin-bottom:20px;
}

.filterButtons button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.filterButtons button:hover{
    background:#55ff55;
    color:black;
}

</style>
</head>
<body>

<div class="container">

<h1>NL Tier Testing</h1>

<h2>Gamemode Filter</h2>

<div class="filterButtons">

<button onclick="filterMode('ALL')">All</button>
<button onclick="filterMode('Spear')">Spear</button>
<button onclick="filterMode('Mace')">Mace</button>
<button onclick="filterMode('Sword')">Sword</button>
<button onclick="filterMode('UHC')">UHC</button>
<button onclick="filterMode('Speed')">Speed</button>
<button onclick="filterMode('Axe')">Axe</button>
<button onclick="filterMode('Vanilla')">Vanilla</button>

</div>

<h2>Leaderboard</h2>

<div id="leaderboard"></div>

</div>

<script>

const tierRank = {
    "HT1":1,
    "LT1":2,
    "HT2":3,
    "LT2":4,
    "HT3":5,
    "LT3":6,
    "HT4":7,
    "LT4":8,
    "HT5":9,
    "LT5":10
};

let currentFilter = "ALL";

let allPlayers = [];

function filterMode(mode){

    currentFilter = mode;

    renderLeaderboard();
}

async function loadPlayers(){

    const response = await fetch("players.json");

    allPlayers = await response.json();

    renderLeaderboard();
}

function renderLeaderboard(){

    const board = document.getElementById("leaderboard");

    let data = [...allPlayers];

    data.sort((a,b) => tierRank[a.tier] - tierRank[b.tier]);

    board.innerHTML = "";

    data.forEach(entry => {

        if(currentFilter !== "ALL" && entry.gamemode !== currentFilter){
            return;
        }

        board.innerHTML += `
            <div class="player">

                <div class="rank">${entry.player}</div>

                <div>
                    ${entry.gamemode} • ${entry.tier}
                </div>

            </div>
        `;
    });
}

loadPlayers();

</script>

</body>
</html>
